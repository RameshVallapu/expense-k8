apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: expense
  labels:
    tier: app
    project: expense
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: app
      project: expense
      component: backend
  template:
    metadata:
      labels:
        tier: app
        project: expense
        component: backend
  spec:
    containers:
    - name: backend-container
      image: dev0pslearning2025/backend:v1.0
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: expense
spec:
  selector:
    tier: app
    project: expense
    component: backend
  ports:
    - protocol: TCP
      port: 8080 #<service-Port>
      targetPort: 8080 #<Target Port>