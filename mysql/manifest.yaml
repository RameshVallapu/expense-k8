apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: expense
  labels:
    tier: db
    project: expense
    component: mysql
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: db
      project: expense
      component: mysql
  template:
    metadata:
      labels:
        tier: db
        project: expense
        component: mysql
  spec:
    containers:
    - name: mysql-container
      image: dev0pslearning2025/mysql:v1.0
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: expense
spec:
  selector:
    tier: db
    project: expense
    component: mysql
  ports:
    - protocol: TCP
      port: 3306 #<service-Port>
      targetPort: 3306 #<Target Port>