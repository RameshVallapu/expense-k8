apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    tier: db
    project: expense
    component: mysql
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: db
      project: expense
      component: mysql
  template:
    metadata:
      labels:
        tier: db
        project: expense
        component: mysql
  spec:
    containers:
    - name: mysql-container
      image: dev0pslearning2025/mysql:v1.0